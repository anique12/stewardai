# Supabase project configuration for portal v1
# Project ref: meygshlnznhnblsgbqqw
#
# To apply migrations:
#   Option A (IPv6 network):
#     npx supabase db push --db-url "postgresql://postgres:<password>@db.meygshlnznhnblsgbqqw.supabase.co:5432/postgres"
#   Option B (Dashboard):
#     Paste portal/supabase/migrations/0001_initial_schema.sql then 0002_rls_policies.sql
#     into Supabase Dashboard → SQL Editor → Run.
#
# NOTE: SUPABASE_SERVICE_ROLE_KEY must be set in portal/.env.local for server-side writes.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa]
max_enrolled_factors = 10

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"
