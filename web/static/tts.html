<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StewardAI — TTS</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <h1>TTS &mdash; text to speech</h1>
      <div class="sub">POST text + voice &rarr; <strong>streamed</strong> 16&nbsp;kHz PCM &rarr; incremental playback.</div>
      <nav>
        <a href="/">Home</a>
        <a href="/tts">TTS</a>
        <a href="/stt">STT</a>
        <a href="/pipeline">Pipeline</a>
      </nav>
    </header>
    <main>
      <div class="card">
        <h2>Synthesize</h2>
        <div class="row">
          <textarea id="text" placeholder="Type something to speak...">Hello, this is the StewardAI text to speech test page.</textarea>
        </div>
        <div class="row">
          <label for="voice">Voice</label>
          <select id="voice"></select>
          <button id="speak">Speak</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </main>

    <script type="module">
      import { $, setStatus, PCMPlayer } from "/static/app.js";

      const voiceSel = $("#voice");
      const status = $("#status");

      async function loadVoices() {
        try {
          const res = await fetch("/api/voices");
          const data = await res.json();
          voiceSel.innerHTML = data.voices
            .map((v) => `<option value="${v}">${v}</option>`)
            .join("");
        } catch (err) {
          setStatus(status, "Failed to load voices: " + err.message);
        }
      }

      async function speak() {
        const text = $("#text").value.trim();
        if (!text) return;
        setStatus(status, "Synthesizing (streaming)…", true);
        // PCMPlayer uses Web Audio; the Speak click is the user gesture that lets it run.
        const player = new PCMPlayer(16000);
        await player.resume();
        const t0 = performance.now();
        let firstAudioMs = null;
        let bytes = 0;
        try {
          const res = await fetch("/api/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, voice: voiceSel.value }),
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const reader = res.body.getReader();
          let leftover = new Uint8Array(0); // carry an odd trailing byte across reads
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            let chunk = value;
            if (leftover.length) {
              const m = new Uint8Array(leftover.length + value.length);
              m.set(leftover, 0);
              m.set(value, leftover.length);
              chunk = m;
              leftover = new Uint8Array(0);
            }
            const even = chunk.length - (chunk.length % 2);
            if (even > 0) {
              if (firstAudioMs === null) {
                firstAudioMs = Math.round(performance.now() - t0);
              }
              player.push(chunk.slice(0, even).buffer); // s16le -> Web Audio
              bytes += even;
            }
            if (even < chunk.length) leftover = chunk.slice(even);
          }
          const secs = (bytes / 2 / 16000).toFixed(2);
          setStatus(status, `Done — first audio ${firstAudioMs} ms · ${secs}s of speech`);
        } catch (err) {
          setStatus(status, "Error: " + err.message);
        }
      }

      $("#speak").addEventListener("click", speak);
      loadVoices();
    </script>
  </body>
</html>
