<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StewardAI — Pipeline</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .orb-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      #orb { width: 280px; height: 280px; max-width: 80vw; }
      .controls { display: flex; align-items: center; gap: 14px; }
      .icon-btn {
        width: 52px; height: 52px; padding: 0; border-radius: 50%; border: 1px solid #2a2f3a;
        background: #161a22; color: #e6e9ef; display: grid; place-items: center;
        cursor: pointer; transition: background .15s, border-color .15s, opacity .15s;
      }
      .icon-btn:hover { background: #1d2330; }
      .icon-btn:disabled { opacity: .4; cursor: not-allowed; }
      .icon-btn.muted { background: #3a1d22; border-color: #7f1d2e; color: #ff8a9b; }
      .icon-btn svg { width: 24px; height: 24px; display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1>Pipeline &mdash; LiveKit agent</h1>
      <div class="sub">
        Mic &rarr; a real LiveKit <strong>AgentSession</strong> (VAD + turn detector +
        STT/LLM/TTS nodes) &rarr; streamed agent audio. The orb reacts to live audio.
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/tts">TTS</a>
        <a href="/stt">STT</a>
        <a href="/pipeline">Pipeline</a>
      </nav>
    </header>
    <main>
      <div class="card">
        <div class="orb-wrap">
          <canvas id="orb" width="280" height="280"></canvas>
          <div class="controls">
            <button id="talk">Talk</button>
            <button id="mute" class="icon-btn" title="Mute mic" disabled aria-label="Mute microphone"></button>
          </div>
          <div class="status" id="status"><span class="dot"></span>Idle</div>
        </div>
      </div>

      <div class="card">
        <h2>You said</h2>
        <div class="transcript" id="transcript"></div>
      </div>

      <div class="card">
        <h2>Assistant</h2>
        <div class="response" id="response"></div>
      </div>

      <div class="card">
        <h2>Latency (last turn)</h2>
        <div class="timing" id="metrics"></div>
      </div>

      <div class="card">
        <h2>Timeline</h2>
        <div class="log" id="log"></div>
      </div>
    </main>

    <script type="module">
      import { $, wsURL, startMic, PCMPlayer, setStatus, logLine } from "/static/app.js";

      const talkBtn = $("#talk");
      const muteBtn = $("#mute");
      const status = $("#status");
      const transcriptEl = $("#transcript");
      const responseEl = $("#response");
      const metricsEl = $("#metrics");
      const logEl = $("#log");

      const MIC_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
      const MIC_OFF_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
      muteBtn.innerHTML = MIC_SVG;

      let mic = null, ws = null, player = null, talking = false, muted = false;
      let turn = {}, micLevel = 0, animT = 0, smoothLevel = 0;

      // --- orb visualizer ---------------------------------------------------
      const orb = $("#orb");
      const g = orb.getContext("2d");
      const LAYERS = [
        { color: "#22d3ee", off: 0, speed: 0.45 },   // cyan
        { color: "#3b82f6", off: 2.1, speed: -0.6 },  // blue
        { color: "#a855f7", off: 4.2, speed: 0.35 },  // purple
      ];
      function drawOrb(level) {
        const w = orb.width, h = orb.height, cx = w / 2, cy = h / 2;
        g.clearRect(0, 0, w, h);
        const base = Math.min(w, h) * 0.26;
        const amp = base * 0.09 + level * base * 0.32; // gentle idle wave + softened audio-reactive
        g.globalCompositeOperation = "lighter";
        for (const L of LAYERS) {
          g.beginPath();
          for (let a = 0; a <= Math.PI * 2 + 0.02; a += 0.04) {
            const r =
              base +
              Math.sin(a * 3 + animT * L.speed + L.off) * amp +
              Math.sin(a * 5 - animT * L.speed * 0.7 + L.off) * amp * 0.5;
            const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
            a === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
          }
          g.closePath();
          g.strokeStyle = L.color;
          g.lineWidth = 3;
          g.shadowColor = L.color;
          g.shadowBlur = 22;
          g.globalAlpha = 0.75;
          g.stroke();
        }
        g.globalAlpha = 1;
        g.shadowBlur = 0;
        g.globalCompositeOperation = "source-over";
      }
      function loop() {
        animT += 0.011; // slower morph
        const agent = player ? player.level() : 0;
        const target = talking ? Math.max(agent, micLevel) : 0;
        smoothLevel += (target - smoothLevel) * 0.06; // ease in/out — no jumpy beats
        micLevel *= 0.9;
        drawOrb(smoothLevel);
        requestAnimationFrame(loop);
      }
      loop();

      // --- metrics panel ----------------------------------------------------
      const METRIC_ROWS = [
        ["eou_delay_ms", "Finished → turn detected"],
        ["stt_ms", "STT decode"],
        ["llm_ttft_ms", "LLM first token (TTFT)"],
        ["tts_ttfb_ms", "TTS first audio (TTFB)"],
      ];
      function renderMetrics() {
        metricsEl.innerHTML = METRIC_ROWS.filter(([k]) => turn[k] != null)
          .map(([k, label]) => `<div class="metric"><div class="k">${label}</div><div class="v">${turn[k]} ms</div></div>`)
          .join("");
      }
      function handleMetric(m) {
        if (m.kind === "eou") { turn.eou_delay_ms = m.eou_delay_ms; logLine(logEl, `⏱ turn detected ${m.eou_delay_ms} ms after you stopped`); }
        else if (m.kind === "stt") { turn.stt_ms = m.duration_ms; logLine(logEl, `STT ${m.duration_ms} ms`); }
        else if (m.kind === "llm") { turn.llm_ttft_ms = m.ttft_ms; logLine(logEl, `LLM first token ${m.ttft_ms} ms`); }
        else if (m.kind === "tts") { turn.tts_ttfb_ms = m.ttfb_ms; logLine(logEl, `TTS first audio ${m.ttfb_ms} ms`); }
        renderMetrics();
      }

      // --- session ----------------------------------------------------------
      async function start() {
        player = new PCMPlayer(16000);
        await player.resume();
        ws = new WebSocket(wsURL("/ws/pipeline"));
        ws.binaryType = "arraybuffer";
        ws.onopen = async () => {
          logLine(logEl, "ws open; building agent session…");
          setStatus(status, "Starting agent…", true);
          mic = await startMic((buf) => {
            if (muted) return; // muted: don't send to the agent AND don't drive the orb
            const i16 = new Int16Array(buf);
            let s = 0;
            for (let i = 0; i < i16.length; i++) { const v = i16[i] / 32768; s += v * v; }
            micLevel = Math.max(micLevel, Math.sqrt(s / i16.length));
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(buf);
          });
          muteBtn.disabled = false;
          logLine(logEl, `mic @ ${mic.sampleRate} Hz`);
        };
        ws.onmessage = (e) => {
          if (typeof e.data !== "string") { player.push(e.data); return; }
          const msg = JSON.parse(e.data);
          if (msg.type === "ready") { setStatus(status, "Listening — just talk", true); logLine(logEl, "agent ready"); }
          else if (msg.type === "transcript") { turn = {}; metricsEl.innerHTML = ""; transcriptEl.textContent = msg.text; responseEl.textContent = ""; logLine(logEl, "you: " + msg.text); }
          else if (msg.type === "reply") { responseEl.textContent = msg.text; logLine(logEl, "assistant: " + msg.text); }
          else if (msg.type === "metric") { handleMetric(msg); }
          else if (msg.type === "clear") { if (player) player.flush(); logLine(logEl, "(interrupted)"); }
          else if (msg.type === "error") { setStatus(status, "Error: " + msg.text); logLine(logEl, "error: " + msg.text); }
        };
        ws.onclose = () => logLine(logEl, "ws closed");
        ws.onerror = () => logLine(logEl, "ws error");
      }

      async function stop() {
        if (mic) await mic.stop();
        mic = null;
        if (ws) ws.close();
        ws = null;
        if (player) player.close();
        player = null;
        muteBtn.disabled = true;
        muted = false;
        muteBtn.classList.remove("muted");
        muteBtn.innerHTML = MIC_SVG;
      }

      talkBtn.addEventListener("click", async () => {
        talking = !talking;
        talkBtn.classList.toggle("recording", talking);
        talkBtn.textContent = talking ? "Stop" : "Talk";
        if (talking) { transcriptEl.textContent = ""; responseEl.textContent = ""; metricsEl.innerHTML = ""; turn = {}; await start(); }
        else { await stop(); setStatus(status, "Idle"); }
      });

      muteBtn.addEventListener("click", () => {
        if (muteBtn.disabled) return;
        muted = !muted;
        muteBtn.classList.toggle("muted", muted);
        muteBtn.innerHTML = muted ? MIC_OFF_SVG : MIC_SVG;
        muteBtn.title = muted ? "Unmute mic" : "Mute mic";
        logLine(logEl, muted ? "mic muted" : "mic unmuted");
      });
    </script>
  </body>
</html>
